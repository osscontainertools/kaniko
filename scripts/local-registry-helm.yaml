apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: local-registry
  namespace: kube-system
spec:
  chart: https://github.com/twuni/docker-registry.helm/archive/refs/tags/v2.2.2.tar.gz
  set:
    # Expose the registry server on localhost
    service.type: "LoadBalancer"
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: local-tls-registry
  namespace: kube-system
spec:
  chart: https://github.com/twuni/docker-registry.helm/archive/refs/tags/v2.2.2.tar.gz
  valuesContent: |-
    service:
      type: LoadBalancer
      port: 5001
    tlsSecretName: local-tls-registry-cert
    extraEnvVars:
      - name: REGISTRY_AUTH
        value: htpasswd
      - name: REGISTRY_AUTH_HTPASSWD_REALM
        value: "Registry Realm"
      - name: REGISTRY_AUTH_HTPASSWD_PATH
        value: /auth/htpasswd
    extraVolumes:
      - name: auth
        secret:
          secretName: local-tls-registry-auth
          items:
            - key: htpasswd
              path: htpasswd
    extraVolumeMounts:
      - name: auth
        mountPath: /auth
        readOnly: true
