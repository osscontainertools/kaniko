name: Integration tests

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'

permissions: {}

jobs:
  tests:
    name: seed-${{ matrix.seed }}
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    env:
      IMAGE_REPO: 'localhost:5000'
      REGISTRY: 'localhost:5000'
      COVERAGE_DIR: '${{ github.workspace }}/out/covdata'
      TEST_PARALLELISM: '1'
      TEST_SHUFFLE_SEED: '${{ matrix.seed }}'

    strategy:
      fail-fast: false
      matrix:
        seed: [1, 2, 3, 7]

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@90e01b21170618765a73370fcc3abbd1684a7793 # v5
        with:
          remove-android: 'true'
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-cached-tools: 'true'

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5.3.0
        with:
          version: 29.5.2

      - run: make install-diffoci k3s-setup
      - name: restart dockerd after setup (no version change)
        run: |
          set -eux
          docker info | grep -i 'containerd version'
          RUN=$(ls -d /home/runner/setup-docker-action/run-*)
          D=/opt/hostedtoolcache/docker-archive-stable/29.5.2/x64
          sudo kill "$(cat "$RUN/docker.pid")" || true
          sleep 3
          sudo pkill -f "$D/containerd" || true
          sleep 1
          sudo "$D/dockerd" --host="unix://$RUN/docker.sock" --config-file="$RUN/daemon.json" --exec-root="$RUN/execroot" --data-root="$RUN/data" --pidfile="$RUN/docker.pid" >/tmp/dockerd.log 2>&1 &
          for i in $(seq 1 20); do docker info >/dev/null 2>&1 && break; sleep 2; done
          docker info | grep -i 'containerd version'
      - run: make integration-test-run

      - name: Convert and upload coverage
        run: |
          go tool covdata textfmt -i out/covdata -o coverage.txt

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.txt
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
